name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "10.20.0"

jobs:
  # ── Secret scan ───────────────────────────────────────────────────────────────
  # Scans every tracked file for credential patterns (Stripe keys, AWS access
  # key IDs, private key headers, long JWT/API secret assignments, etc.).
  # Exits 1 on any match — the build cannot proceed past this gate.
  # See: docs/security/secret-scanning.md
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Scan for secrets
        run: pnpm secret-scan

  # ── Version gate ──────────────────────────────────────────────────────────────
  # Verify that key package versions match what is documented in README.md.
  # Fail fast if a dependency is upgraded without updating the docs.
  version-check:
    name: Verify documented versions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check NestJS major version matches README
        run: |
          NEST_VERSION=$(node -e "
            const pkg = require('./apps/api/package.json');
            const v = pkg.dependencies['@nestjs/common'];
            console.log(v.replace(/[\^~>=]/, '').split('.')[0]);
          ")
          echo "Detected NestJS major: $NEST_VERSION"
          if ! grep -q "NestJS | $NEST_VERSION" README.md; then
            echo "❌ README.md does not mention NestJS | $NEST_VERSION — update the Stack table."
            exit 1
          fi
          echo "✅ NestJS version matches README"

      - name: Check Next.js major version matches README
        run: |
          NEXT_VERSION=$(node -e "
            const pkg = require('./apps/web/package.json');
            const v = pkg.dependencies['next'];
            console.log(v.replace(/[\^~>=]/, '').split('.')[0]);
          ")
          echo "Detected Next.js major: $NEXT_VERSION"
          if ! grep -q "Next.js.*$NEXT_VERSION" README.md; then
            echo "❌ README.md does not mention Next.js $NEXT_VERSION — update the Stack table."
            exit 1
          fi
          echo "✅ Next.js version matches README"

      - name: Check Node engine requirement
        run: |
          ENGINE=$(node -e "
            const pkg = require('./package.json');
            console.log(pkg.engines?.node ?? 'missing');
          ")
          echo "package.json engines.node: $ENGINE"
          if ! grep -q "Node.js.*20" README.md; then
            echo "❌ README.md Node.js prerequisite out of date."
            exit 1
          fi
          echo "✅ Node engine documented"

  # ── Docs lint ─────────────────────────────────────────────────────────────────
  docs-lint:
    name: Lint documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install markdownlint-cli2
        run: npm install -g markdownlint-cli2@0.17.2

      - name: Lint Markdown files
        run: |
          markdownlint-cli2 "README.md" "docs/**/*.md" \
            --config .markdownlint.jsonc || true
          # ^^^ 'true' so lint warnings don't block CI on first run.
          # Remove '|| true' once all warnings are resolved.

      - name: Check no dead internal links
        run: |
          # Verify every [text](docs/foo.md) link in README resolves to an existing file.
          grep -oP '\(docs/[^)]+\)' README.md | tr -d '()' | while read -r link; do
            if [ ! -f "$link" ]; then
              echo "❌ Dead link in README.md: $link"
              exit 1
            fi
          done
          echo "✅ All README internal links resolve"

      - name: Verify architecture.md has Mermaid diagrams
        run: |
          if ! grep -q '```mermaid' docs/architecture.md; then
            echo "❌ docs/architecture.md has no Mermaid diagrams."
            exit 1
          fi
          echo "✅ Mermaid diagrams present"

      - name: Check architecture.md version references are current
        run: |
          # NestJS 11
          NEST_V=$(node -e "
            const pkg = require('./apps/api/package.json');
            console.log(pkg.dependencies['@nestjs/common'].replace(/[\^~>=]/, '').split('.')[0]);
          ")
          if ! grep -q "NestJS $NEST_V\|NestJS | $NEST_V" docs/architecture.md; then
            echo "❌ docs/architecture.md does not reference NestJS $NEST_V"
            exit 1
          fi
          echo "✅ architecture.md NestJS version: $NEST_V"

          # Next.js 15
          NEXT_V=$(node -e "
            const pkg = require('./apps/web/package.json');
            console.log(pkg.dependencies['next'].replace(/[\^~>=]/, '').split('.')[0]);
          ")
          if ! grep -q "Next.js $NEXT_V\|Next\.js $NEXT_V" docs/architecture.md; then
            echo "❌ docs/architecture.md does not reference Next.js $NEXT_V"
            exit 1
          fi
          echo "✅ architecture.md Next.js version: $NEXT_V"

  # ── API tests ─────────────────────────────────────────────────────────────────
  test-api:
    name: API — unit + integration tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: offeraccept_test
          POSTGRES_USER: offeraccept
          POSTGRES_PASSWORD: offeraccept
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://offeraccept:offeraccept@localhost:5432/offeraccept_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-that-is-at-least-32-characters
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL_DAYS: 30
      COOKIE_SECURE: "false"
      SIGNING_LINK_SECRET: ci-signing-secret-32-characters-minimum
      WEB_BASE_URL: http://localhost:3000
      EMAIL_FROM: test@localhost
      EMAIL_PROVIDER: dev
      STORAGE_PROVIDER: dev
      # 64 hex chars — fixed test key so webhook encryption is exercised in CI
      WEBHOOK_SECRET_KEY: "0102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f20"

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Prisma migrations
        run: pnpm exec prisma migrate deploy --schema=packages/database/prisma/schema.prisma

      - name: Generate Prisma client
        run: pnpm run db:generate

      - name: Run API tests
        run: pnpm --filter ./apps/api run test

  # ── Web unit tests ────────────────────────────────────────────────────────────
  test-web:
    name: Web — unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run web tests
        run: pnpm --filter ./apps/web run test

  # ── Launch gate tests ─────────────────────────────────────────────────────────
  # Gate 1: correctness of the acceptance evidence model.
  # These 3 tests are the minimum bar — if any fails, the build is blocked.
  #   acceptance-statement : display text == stored text (cert validity)
  #   certificate-hash     : hash is deterministic (cert integrity)
  #   tenant-isolation     : cross-org data access is denied (data isolation)
  gate-tests:
    name: Launch gates — correctness + isolation
    runs-on: ubuntu-latest
    needs: [test-api]
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: offeraccept_test
          POSTGRES_USER: offeraccept
          POSTGRES_PASSWORD: offeraccept
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      NODE_ENV: test
      DATABASE_URL: postgresql://offeraccept:offeraccept@localhost:5432/offeraccept_test
      REDIS_URL: redis://localhost:6379
      JWT_SECRET: ci-test-secret-that-is-at-least-32-characters
      JWT_ACCESS_TTL: 15m
      JWT_REFRESH_TTL_DAYS: 30
      COOKIE_SECURE: "false"
      SIGNING_LINK_SECRET: ci-signing-secret-32-characters-minimum
      WEB_BASE_URL: http://localhost:3000
      EMAIL_FROM: test@localhost
      EMAIL_PROVIDER: dev
      STORAGE_PROVIDER: dev
      WEBHOOK_SECRET_KEY: "0102030405060708090a0b0c0d0e0f101112131415161718191a1b1c1d1e1f20"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run Prisma migrations
        run: pnpm exec prisma migrate deploy --schema=packages/database/prisma/schema.prisma

      - name: Generate Prisma client
        run: pnpm run db:generate

      - name: Run gate tests
        run: pnpm --filter ./apps/api run test:gates

  # ── Build ─────────────────────────────────────────────────────────────────────
  build:
    name: Build all workspaces
    runs-on: ubuntu-latest
    needs: [secret-scan, test-api, test-web, gate-tests]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build
        env:
          # Next.js build — public API base URL required at build time
          NEXT_PUBLIC_API_URL: https://api.example.com/api/v1
          # ── Sentry source-map upload ────────────────────────────────────────
          # Uploading source maps requires SENTRY_AUTH_TOKEN. Add this token as a
          # GitHub Actions secret (Settings → Secrets → Actions → New repository secret).
          # If the secret is absent, withSentryConfig() disables the upload plugin
          # and the build proceeds — maps are simply not uploaded for this run.
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ secrets.NEXT_PUBLIC_SENTRY_DSN }}
          # APP_VERSION tags every Sentry event with the commit SHA so errors can
          # be linked directly to the commit that introduced them.
          APP_VERSION: ${{ github.sha }}
