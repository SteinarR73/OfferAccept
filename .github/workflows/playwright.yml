name: Playwright E2E Tests
# E2E tests require a running API + web server (full Docker Compose stack).
# Run manually via GitHub Actions UI, or trigger from a CD pipeline after deploy.
# Do NOT run on every push — these are not unit tests.
on:
  workflow_dispatch:
    inputs:
      base_url:
        description: 'Web server URL to test against'
        required: false
        default: 'http://localhost:3000'
      sign_token:
        description: 'PLAYWRIGHT_SIGN_TOKEN — a SENT deal token for acceptance flow'
        required: false

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - uses: pnpm/action-setup@v4
      with:
        run_install: false
    - name: Install dependencies
      run: pnpm install --frozen-lockfile
    - name: Install Playwright Browsers
      run: pnpm --filter ./apps/web exec playwright install --with-deps chromium
    - name: Run Playwright tests
      env:
        BASE_URL: ${{ inputs.base_url }}
        PLAYWRIGHT_SIGN_TOKEN: ${{ inputs.sign_token }}
      run: pnpm --filter ./apps/web exec playwright test
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: apps/web/playwright-report/
        retention-days: 30
